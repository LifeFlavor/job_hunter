name: Daily Job Check

on:
  schedule:
    # 這裡設定時間。注意：GitHub 使用 UTC 時間，
    # 所以台灣時間 09:00 是 UTC 01:00
    - cron: '0 1 * * *' 
  workflow_dispatch: # 讓妳也可以手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/set-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run script
        run: python job_hunter.py
