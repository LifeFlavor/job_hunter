name: Daily Job Check

on:
  schedule:
    # 這裡設定為 UTC 07:00，即台灣時間 15:00 (3PM)
    - cron: '0 7 * * *'
  workflow_dispatch: # 讓妳也可以手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/set-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run script
        run: python job_hunter.py
